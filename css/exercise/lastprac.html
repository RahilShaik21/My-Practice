<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>progress bar</title>
    <style>
    .progress-container{
        width: 90%;
        height: 25px;
        background-color: rgb(196, 196, 196);    
        border: 2px solid black;
        border-radius: 15px;
    }
    .progress-bar{
         width: 0%;
        height: 100%;
        background-color: rgb(196, 196, 196);    
        background-color:darkblue;
        border-radius: 15px;
        animation: progress 10s ease-in-out 1s infinite;

    }
    @keyframes progress {
       0%{width: 0%;}
        10%{width:20%;}
        25%{width:25%;}
        40%{width:40%;}
        55%{width:55%;}
        70%{width:70%;}
        80%{width:90%;}
        80%{width:90%;}
        81%{width:70%;}
        /* 86%{width: 80%;} */
        98%{width: 95%;}
       100%{width: 100%;}
        
    }
    </style>
</head>
<body>
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
</body>
</html>
