<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>padding property</title>
    <style>
        *{margin: 0;padding: 0;}
        #pad{
            border:5px solid hotpink;
            margin: 5px;
            padding: 5px;
            height: 50px;width: 50px;
            background-color: rgba(225, 0, 64, 0.88);
            border-radius: 15px;
        }
        #mar{
            border: 5px dashed violet;
            margin: 25px 5px 50px 45px;
            padding: 5px;
            height: 50px;width: 50px;
            border-radius: 5px 5px 5px 5px;
            background-color: rgba(225, 0, 64, 0.88);
            box-sizing: content-box;
        } 
    </style>
</head>
<body>
    <div id="pad">padding check</div>
    <div id="mar">margin check</div>
</body>
</html>
