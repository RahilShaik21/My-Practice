<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animatiom</title>
    <style>
        .box{
            height: 50px;
            width: 50px;
            border: 2px solid black;
            background-color: plum;
            padding:5px;
            border-radius: 10px;
            position: relative;
            top:10px; left: 10px;
            /* animation-name: move;
            animation-duration: 0.1s;
            animation-timing-function: ease-in-out;
            animation-delay:0s;
            animation-iteration-count:5;
            animation-direction:alternate; */
            animation: jadu 2s ease-in-out 1s infinite ;
        }
        @keyframes move {
            from{
                left:0%;;
            }
            to{left:100%;}
        }
        @keyframes jadu {
            0%{left: 10%;}
            25%{right:20%;}
            50%{left:50%;}
            100%{left:100%}
        }
    </style>
</head>
<body>
    <div class="box">animate</div>
</body>
</html>
